<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Clinique</title>
</head>
<body>
    <h1>Liste des patients</h1>
    <a href="/add">Ajouter un patient</a>
    <table border="1" cellpadding="8">
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Âge</th>
            <th>Sexe</th>
            <th>Action</th>
        </tr>
        {% for patient in patients %}
        <tr>
            <td>{{ patient.id }}</td>
            <td>{{ patient.nom }}</td>
            <td>{{ patient.prenom }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.sexe }}</td>
            <td><a href="/delete/{{ patient.id }}">Supprimer</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
