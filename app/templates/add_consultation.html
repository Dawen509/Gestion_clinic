<h1>Ajouter une consultation</h1>
<form method="POST">
    ID Patient : <input type="text" name="patient_id"><br>
    ID Docteur : <input type="text" name="doctor_id"><br>
    Date : <input type="date" name="date"><br>
    Heure : <input type="text" name="time" placeholder="ex: 14:30"><br>
    Paiement : <input type="number" step="0.01" name="payment"><br>
    Diagnostic : <input type="text" name="diagnostic"><br>
    Traitement : <input type="text" name="treatment"><br>
    Observations : <input type="text" name="observations"><br>
    <button type="submit">Enregistrer</button>
</form>
<a href="/">Retour à l'accueil</a>
